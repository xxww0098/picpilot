services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    command: ["caddy", "reverse-proxy", "--from", "${PUBLIC_ORIGIN:-localhost}", "--to", "frontend:80"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    networks:
      - picpilot_net

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: picpilot-frontend
    restart: unless-stopped
    depends_on:
      - auth
    expose:
      - "80"
    networks:
      - picpilot_net

  auth:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: picpilot-auth
    restart: unless-stopped
    environment:
      - ADMIN_USERS=${ADMIN_USERS}
      - JWT_SECRET=${JWT_SECRET}
      - API_PROXY_URL=${API_PROXY_URL:-http://cli-proxy-api:8317/v1}
      - API_PROXY_API_KEY=${API_PROXY_API_KEY:-}
      - CLIPROXY_API_URL=${CLIPROXY_API_URL:-http://cli-proxy-api:8317}
      - CLIPROXY_MGMT_KEY=${CLIPROXY_MGMT_KEY:-}
      - MAX_CONCURRENT_PROXY_REQUESTS=${MAX_CONCURRENT_PROXY_REQUESTS:-5}
      - PROXY_QUEUE_MAX=${PROXY_QUEUE_MAX:-50}
      - PROXY_QUEUE_MAX_WAIT_MS=${PROXY_QUEUE_MAX_WAIT_MS:-120000}
      - DATA_DIR=/data
      - DB_PATH=/data/auth.db
    volumes:
      - auth_data:/data
    expose:
      - "3001"
    networks:
      - picpilot_net

  cli-proxy-api:
    image: eceasy/cli-proxy-api:latest
    container_name: cli-proxy-api
    restart: unless-stopped
    volumes:
      - ./cliproxy/config.yaml:/CLIProxyAPI/config.yaml:ro
      - ./cliproxy/auths:/root/.cli-proxy-api
      - ./cliproxy/logs:/CLIProxyAPI/logs
    expose:
      - "8317"
    networks:
      - picpilot_net

networks:
  picpilot_net:

volumes:
  caddy_data:
  caddy_config:
  auth_data:
