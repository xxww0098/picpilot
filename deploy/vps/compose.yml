# 生产 VPS 主机栈（实盘位置 /opt/picpilot/compose.yml）的版本化备份。
# 注意：本文件已脱敏——dockercopilot 的 secretKey 改为 ${DOCKERCOPILOT_SECRET}（实盘曾硬编码，勿提交真值）。
# 恢复步骤：cp 本文件到 /opt/picpilot/compose.yml，并在 /opt/picpilot/.env 填好 DOCKERCOPILOT_SECRET 等变量（见 .env.example）。
# 改动实盘 compose 后请同步回本文件并重新脱敏。镜像由 deploy.sh 从 /root/picpilot 本机构建（PICPILOT_VERSION 控制标签）。
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443", "443:443/udp"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    extra_hosts: ["host.docker.internal:host-gateway"]

  cliproxy:
    image: eceasy/cli-proxy-api:latest
    restart: unless-stopped
    pull_policy: always
    environment:
      DEPLOY: docker
    volumes:
      - ./data/cliproxy/config.yaml:/CLIProxyAPI/config.yaml
      - ./data/cliproxy/auths:/root/.cli-proxy-api
      - ./data/cliproxy/logs:/CLIProxyAPI/logs

  dockercopilot:
    image: 0nlylty/dockercopilot:latest
    restart: unless-stopped
    privileged: true
    environment:
      TZ: Asia/Tokyo
      DOCKER_HOST: unix:///var/run/docker.sock
      secretKey: ${DOCKERCOPILOT_SECRET:?set DOCKERCOPILOT_SECRET in .env}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/dockercopilot:/data

  # 单镜像 = Go 后端 + 前端静态文件（构建上下文必须是仓库根，见 server-go/Dockerfile 头注）
  auth:
    image: picpilot-auth:${PICPILOT_VERSION:-latest}
    build:
      context: /root/picpilot
      dockerfile: server-go/Dockerfile
      args:
        APP_VERSION: ${PICPILOT_VERSION:-dev}
    restart: unless-stopped
    environment:
      - ADMIN_USERS=${ADMIN_USERS}
      - JWT_SECRET=${JWT_SECRET}
      - UPSTREAM_MODE=${UPSTREAM_MODE:-api}
      - API_PROXY_URL=${API_PROXY_URL:-http://cliproxy:8317/v1}
      - API_PROXY_API_KEY=${API_PROXY_API_KEY}
      - REVERSE_PROXY_URL=${REVERSE_PROXY_URL:-internal}
      - REVERSE_PROXY_API_KEY=${REVERSE_PROXY_API_KEY}
      - CHATGPT2API_AUTH_KEY=${CHATGPT2API_AUTH_KEY}
      - CHATGPT_REVERSE_INTERNAL=${CHATGPT_REVERSE_INTERNAL:-}
      - CHATGPT_REVERSE_BASE_URL=${CHATGPT_REVERSE_BASE_URL:-https://chatgpt.com}
      - CHATGPT_REVERSE_ACCOUNT_CONCURRENCY=${CHATGPT_REVERSE_ACCOUNT_CONCURRENCY:-1}
      - CLIPROXY_API_URL=${CLIPROXY_API_URL:-http://cliproxy:8317}
      - CLIPROXY_MGMT_KEY=${CLIPROXY_MGMT_KEY}
      - CLIPROXY_LOG_DIR=/cliproxy-logs
      - OUTBOUND_PROXY_TYPE=${OUTBOUND_PROXY_TYPE:-env}
      - OUTBOUND_PROXY_URL=${OUTBOUND_PROXY_URL:-}
      - MAX_CONCURRENT_PROXY_REQUESTS=${MAX_CONCURRENT_PROXY_REQUESTS:-5}
      - PROXY_QUEUE_MAX=${PROXY_QUEUE_MAX:-10}
      - PROXY_QUEUE_MAX_WAIT_MS=${PROXY_QUEUE_MAX_WAIT_MS:-240000}
      - PROXY_USER_SOFT_LIMIT=${PROXY_USER_SOFT_LIMIT:-3}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-900}
      - STREAM_FALLBACK_ENABLED=${STREAM_FALLBACK_ENABLED:-true}
      - DATA_DIR=/data
      - DB_PATH=/data/auth.db
    volumes:
      - ./data/picpilot:/data
      - ./data/cliproxy/logs:/cliproxy-logs:ro

volumes:
  caddy_data:
