<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <!-- Background Light Gradient (Soft glassy look) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- Playful Candy-Neon Gradients -->
    <!-- 1. Left Wing: Candy Pink to Sun Orange -->
    <linearGradient id="neon-pink-orange" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4e93" />
      <stop offset="100%" stop-color="#ff9f43" />
    </linearGradient>

    <!-- 2. Right Wing: Electric Green to Neon Cyan -->
    <linearGradient id="neon-green-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1dd1a1" />
      <stop offset="100%" stop-color="#00d2d3" />
    </linearGradient>

    <!-- 3. Left Underfold: Yellow to Lime -->
    <linearGradient id="neon-yellow-lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#a3e635" />
    </linearGradient>

    <!-- 4. Right Underfold: Cyan to Purple-Indigo -->
    <linearGradient id="neon-cyan-purple" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2d3" />
      <stop offset="50%" stop-color="#9b59b6" />
      <stop offset="100%" stop-color="#34495e" />
    </linearGradient>

    <!-- Soft Drop Shadow under the plane -->
    <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- PWA Squircle Backdrop (Soft, Glassy & Premium) -->
  <rect width="64" height="64" fill="url(#bg-grad)" rx="18" />
  <rect x="0.5" y="0.5" width="63" height="63" fill="none" stroke="#e2e8f0" stroke-width="1" rx="17.5" />

  <!-- Playful Floating 'Bubbles of Creativity' & Sparks (Background Layer) -->
  <g opacity="0.85">
    <circle cx="16" cy="22" r="2.2" fill="#ff4e93" />
    <circle cx="20" cy="18" r="1.2" fill="#00d2d3" />
    <circle cx="34" cy="14" r="2.8" fill="#ff9f43" />
    <circle cx="48" cy="24" r="1.8" fill="#1dd1a1" />
    <circle cx="45" cy="46" r="2.5" fill="#9b59b6" />
    <circle cx="18" cy="45" r="1.5" fill="#facc15" />
    
    <!-- Sparkle Stars -->
    <path d="M 44,15 L 45,17 L 47,18 L 45,19 L 44,21 L 43,19 L 41,18 L 43,17 Z" fill="#facc15" opacity="0.9" />
    <path d="M 12,35 L 13,36.5 L 15,37 L 13,37.5 L 12,39 L 11,37.5 L 9,37 L 11,36.5 Z" fill="#ff4e93" opacity="0.8" />
  </g>

  <!-- Playful Rounded Origami Paper Plane -->
  <g filter="url(#soft-shadow)" transform="translate(1, 1)">
    <!-- 1. Left Underfold (Yellow to Lime) -->
    <polygon points="27,34 15,31 23,42" fill="url(#neon-yellow-lime)" 
             stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" />

    <!-- 2. Right Underfold (Cyan to Purple) -->
    <polygon points="27,34 23,42 37,43" fill="url(#neon-cyan-purple)" 
             stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" />

    <!-- 3. Left Wing (Candy Pink to Sun Orange) -->
    <polygon points="45,18 15,31 27,34" fill="url(#neon-pink-orange)" 
             stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" />
             
    <!-- 4. Right Wing (Electric Green to Neon Cyan) -->
    <polygon points="45,18 27,34 37,43" fill="url(#neon-green-cyan)" 
             stroke="#ffffff" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" />
  </g>
</svg>
